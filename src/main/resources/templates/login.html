<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - JD Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            padding: 48px;
            border-radius: 16px;
            text-align: center;
            min-width: 360px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .kakao-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            background: #FEE500;
            color: #191919;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .kakao-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(254, 229, 0, 0.3);
        }
        .kakao-btn svg {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>JD Platform</h1>
        <p class="subtitle">서비스를 이용하려면 로그인해 주세요</p>
        <a th:href="@{/oauth2/authorization/kakao}" class="kakao-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M12 3c5.799 0 10.5 3.664 10.5 8.185 0 4.52-4.701 8.184-10.5 8.184a13.5 13.5 0 0 1-1.727-.11l-4.408 2.883c-.501.265-.678.236-.472-.413l.892-3.678c-2.88-1.46-4.785-3.99-4.785-6.876C1.5 6.665 6.201 3 12 3z"/>
            </svg>
            카카오로 로그인
        </a>
    </div>
</body>
</html>
