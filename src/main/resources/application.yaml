spring:
  application:
    name: jd-platform
  profiles:
    include: local
  datasource:
    url: jdbc:mysql://localhost:3306/mytestdb?createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: rneksrl951!
  jpa:
    hibernate:
      ddl-auto: update
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - openid
              - profile
              - email

app:
  jwt:
    secret: ${JWT_SECRET:jd-platform-jwt-secret-key-for-dev-only-must-be-at-least-32-chars}
    expiration: 86400000
  frontend-url: http://localhost:3000
